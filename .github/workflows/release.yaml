name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            apt: libgtk-3-dev libwebkit2gtk-4.0-dev
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get install -y ${{ matrix.apt }}

      - name: Install macOS deps
        if: matrix.goos == 'darwin'
        run: xcode-select --install || true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          go build -o rend-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: rend-${{ matrix.goos }}-${{ matrix.goarch }}